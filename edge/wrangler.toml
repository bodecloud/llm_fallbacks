name = "llm-fallbacks-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
ALLOWED_ORIGINS = "https://bodecloud.github.io,http://127.0.0.1:8765,http://127.0.0.1:5500,http://localhost:5500,http://localhost:8765"
MAX_TOKENS_CAP = "1024"
MODEL_CHAIN = "openrouter/free"
PROXY_GUEST_TOKEN = "llm-fallbacks-public"
WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

[ai]
binding = "AI"

# Optional secrets (set via `wrangler secret put` or CI):
# OPENROUTER_API_KEY, GROQ_API_KEY — override PROXY_GUEST_TOKEN via secret if desired
