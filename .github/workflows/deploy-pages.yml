name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate docs/config.js from secrets
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          LITELLM_URL: ${{ secrets.LITELLM_URL }}
          PROXY_GUEST_TOKEN: ${{ secrets.PROXY_GUEST_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os

          endpoints = []
          for key in ("WORKER_URL", "LITELLM_URL"):
              val = (os.environ.get(key) or "").strip().rstrip("/")
              if val:
                  endpoints.append(val)

          cfg = {
              "endpoints": endpoints or ["http://127.0.0.1:4000"],
              "guestToken": os.environ.get("PROXY_GUEST_TOKEN") or "configure-secrets",
              "defaultModel": "free",
              "catalogUrl": "https://raw.githubusercontent.com/bolabaden/llm_fallbacks/main/configs/free_models.json",
              "providerUrlsUrl": "https://raw.githubusercontent.com/bolabaden/llm_fallbacks/main/configs/provider_urls.json",
              "maxTokens": 512,
          }
          body = "window.LLM_FALLBACKS_CONFIG = " + json.dumps(cfg, indent=2) + ";\n"
          open("docs/config.js", "w", encoding="utf-8").write(body)
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
