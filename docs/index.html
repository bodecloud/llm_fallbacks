<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>llm-fallbacks — free model chat</title>
  <meta name="description" content="Chat with ranked free LLMs via llm-fallbacks failover routing." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --success: #3fb950;
      --error: #f85149;
      --user-bg: #1c2128;
      --assistant-bg: #0d1117;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
      background: var(--surface);
    }
    header h1 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--muted);
    }
    .controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    label { font-size: 0.75rem; color: var(--muted); }
    select, button, textarea {
      font: inherit;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    select {
      padding: 0.35rem 0.5rem;
      font-size: 0.8125rem;
      max-width: 14rem;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 48rem;
      width: 100%;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      line-height: 1.55;
      font-size: 0.9375rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { background: var(--user-bg); border: 1px solid var(--border); }
    .msg.assistant { background: var(--assistant-bg); border-left: 3px solid var(--accent-dim); }
    .msg.system { color: var(--muted); font-size: 0.8125rem; text-align: center; border: none; }
    .msg.error { color: var(--error); border-left-color: var(--error); }
    footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .composer {
      max-width: 48rem;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 2.75rem;
      max-height: 10rem;
      padding: 0.65rem 0.75rem;
      resize: vertical;
      line-height: 1.4;
    }
    button {
      padding: 0.55rem 1rem;
      cursor: pointer;
      background: var(--accent-dim);
      border-color: var(--accent-dim);
      font-weight: 500;
      font-size: 0.875rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border-color: var(--border);
    }
    #status {
      max-width: 48rem;
      margin: 0.5rem auto 0;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>llm-fallbacks</h1>
      <p>Ranked free models · edge + PaaS failover</p>
    </div>
    <div class="controls">
      <label for="model">Model</label>
      <select id="model" aria-label="Model selection">
        <option value="free">free (ranked fallback chain)</option>
      </select>
      <button type="button" class="secondary" id="clear">Clear</button>
    </div>
  </header>

  <main id="chat" aria-live="polite"></main>

  <footer>
    <form class="composer" id="form">
      <textarea id="input" rows="2" placeholder="Message…" required aria-label="Message input"></textarea>
      <button type="submit" id="send">Send</button>
    </form>
    <div id="status">Loading catalog…</div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
