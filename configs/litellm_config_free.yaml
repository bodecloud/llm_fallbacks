    api_key: os.environ/OPENROUTER_API_KEY
    input_cost_per_token: 0.0
    output_cost_per_token: 0.0
    max_input_tokens: 262144
    max_output_tokens: 32768
    metadata:
      notes: Laguna S 2.1 is the latest coding agent model from [Poolside](<https://poolside.ai/>).
        Laguna S 2.1 is a 118B total parameter model with 8B active parameters, scoring
        70.2% on Terminal-Bench 2.1 and...
